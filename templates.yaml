- number:
  - name: "EVSE_Set_ChargingCurrentManual"
    unique_id: victron_ctrl_charger_manual_current_setter
    state: "{{ states('sensor.EVSE_ChargingCurrentManual') }}"
    min: 6
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: "mdi:current-ac"
    set_value:
      - service: modbus.write_register
        data:
          hub: VictronEVSE
          address: 5016 # Same address as the read sensor
          value: "{{ value | int }}"
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.EVSE_ChargingCurrentManual

