type: grid
cards:
  - type: heading
    heading: EV Charger
    heading_style: title
    icon: mdi:ev-station
    badges:
      - type: entity
        show_state: true
        show_icon: true
        entity: select.evse_set_charger_mode
        tap_action:
          action: more-info
      - type: entity
        show_state: true
        show_icon: false
        entity: sensor.evse_get_chargerstatus
  - type: gauge
    entity: sensor.evse_chargingpower
    max: 22
    severity:
      green: 0
      yellow: 7
      red: 12
    grid_options:
      columns: 6
      rows: 2
    name: Power
    needle: true
  - type: tile
    entity: switch.evse_set_startstopcharging_2
    name: Start / Stop
    show_entity_picture: false
    hide_state: true
    vertical: false
    tap_action:
      action: toggle
    features_position: bottom
  - type: tile
    entity: switch.evse_autostart
    name: Auto Start
    vertical: false
    tap_action:
      action: toggle
    icon_tap_action:
      action: toggle
    features_position: bottom
  - type: tile
    entity: number.evse_set_chargingcurrentmanual
    name: Current Limit
    hide_state: false
    vertical: false
    features:
      - type: numeric-input
        style: slider
    features_position: inline
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading_style: subtitle
        heading: Session Stats
        badges:
          - type: entity
            show_state: true
            show_icon: false
            entity: sensor.evse_sessiontimeage
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        entities:
          - entity: sensor.evse_sessiontimelive
            name: Duration
          - entity: sensor.evse_sessionenergy
            name: Energy
          - entity: sensor.evse_get_detectedcarphases
            name: Car Phases
            show_state: true
            icon: mdi:ev-plug-type2
            show_last_changed: false
  - graph: line
    type: sensor
    entity: sensor.evse_totalenergy
    detail: 1
    name: Total Energy
    grid_options:
      columns: full
      rows: 2
    hours_to_show: 240
  - chart_type: bar
    period: month
    type: statistics-graph
    entities:
      - sensor.evse_totalenergy
    stat_types:
      - change
    hide_legend: true
    logarithmic_scale: false
    grid_options:
      columns: 12
      rows: 3

